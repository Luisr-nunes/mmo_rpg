<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMO RPG Pixel Art (MVP)</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #gameCanvas {
            background-color: #78a252; /* Cor de grama base */
            border: 4px solid #1a252f;
            image-rendering: pixelated; /* Mantém o estilo pixel art sem borrar */
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #ui {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
        }
        .status {
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <h1>Projeto MMO RPG (MVP v0.1)</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui">
        <div>Status do Servidor: <span id="connStatus" style="color: #e74c3c;">Desconectado</span></div>
        <div>Madeira Coletada: <span id="scoreDisplay" class="status">0</span></div>
    </div>

    <!-- Usando HTML5 Canvas puro para o MVP -->
    <script src="game.js"></script>
</body>
</html>
