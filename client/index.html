<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMO RPG Pixel Art (v0.3)</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            background-color: #000;
            border: 4px solid #16213e;
            image-rendering: pixelated;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #ui {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
        }
        
        /* Inventário Overlay */
        #inventoryUI {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 39, 73, 0.95);
            border: 4px solid #4a536b;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 10;
        }
        #inventoryUI h2 {
            margin-top: 0;
            text-align: center;
            color: #e9c46a;
            border-bottom: 2px solid #4a536b;
            padding-bottom: 10px;
        }
        .inv-item {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            padding: 10px 0;
            border-bottom: 1px dashed #4a536b;
        }
        .inv-hint {
            position: absolute;
            bottom: -30px;
            right: 0;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Projeto MMO RPG (v0.3)</h1>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="inventoryUI">
            <h2>🎒 Mochila</h2>
            <div class="inv-item">
                <span>Madeira</span>
                <span id="invWoodCount" style="color: #2ecc71;">0</span>
            </div>
            <!-- Futuros itens entrarão aqui -->
            <div style="text-align: center; margin-top: 15px; font-size: 12px; color: #aaa;">Pressione 'I' para fechar</div>
        </div>
        <div class="inv-hint">Pressione [ I ] para abrir o inventário</div>
    </div>
    
    <div id="ui">
        <div>Servidor: <span id="connStatus" style="color: #e74c3c;">Desconectado</span></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
